<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Админка Telegram-бота</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding-top: 2rem; background-color: #f8f9fa; }
    .card { margin-bottom: 1.5rem; box-shadow: 0 0.125rem 0.25rem rgba(0,0,0,.075); }
    .message { padding: 0.75rem; margin-bottom: 0.5rem; border-radius: 8px; font-size: 0.95rem; }
    .user-msg { background-color: #e9ecef; border-left: 4px solid #6c757d; }
    .bot-msg { background-color: #d1ecf1; border-left: 4px solid #17a2b8; }
    .model-badge {
      font-family: Consolas, monospace;
      font-size: 0.85em;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="mb-4">🛠 Админка Telegram-бота</h1>

    <!-- Список пользователей -->
    <div class="card">
      <div class="card-header bg-primary text-white">
        <h5 class="mb-0">Активные пользователи</h5>
      </div>
      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-hover align-middle">
            <thead>
              <tr>
                <th>ID</th>
                <th>Имя / Юзернейм</th>
                <th>Модель ИИ</th>
                <th>Последнее сообщение</th>
                <th>Действия</th>
              </tr>
            </thead>
            <tbody id="usersTableBody">
              <!-- Пример данных (в реальности — из API) -->
              <tr>
                <td>123456789</td>
                <td><strong>Иван</strong><br><small>@ivan_tg</small></td>
                <td><span class="badge bg-success model-badge">z-ai/glm-4.5-air:free</span></td>
                <td><small class="text-muted">Привет! Как дела?</small></td>
                <td>
                  <button class="btn btn-sm btn-outline-primary" onclick="loadHistory(123456789)">История</button>
                  <button class="btn btn-sm btn-outline-warning" onclick="openModelSelector(123456789)">Сменить модель</button>
                </td>
              </tr>
              <tr>
                <td>987654321</td>
                <td><strong>Анна</strong><br><small>@anna_dev</small></td>
                <td><span class="badge bg-info model-badge">x-ai/grok-4.1-fast:free</span></td>
                <td><small class="text-muted">Что нового?</small></td>
                <td>
                  <button class="btn btn-sm btn-outline-primary" onclick="loadHistory(987654321)">История</button>
                  <button class="btn btn-sm btn-outline-warning" onclick="openModelSelector(987654321)">Сменить модель</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Модальное окно: выбор модели -->
  <div class="modal fade" id="modelModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Выберите модель ИИ для пользователя <span id="modalUserId"></span></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="d-grid gap-2">
            <button class="btn btn-outline-primary" onclick="changeModelTo('tngtech/deepseek-r1t2-chimera:free')">
              DeepSeek
            </button>
            <button class="btn btn-outline-success" onclick="changeModelTo('z-ai/glm-4.5-air:free')">
              Z.AI
            </button>
            <button class="btn btn-outline-info" onclick="changeModelTo('x-ai/grok-4.1-fast:free')">
              Grok4
            </button>
          </div>
          <div class="mt-3">
            <label class="form-label">Или введите вручную:</label>
            <input type="text" id="customModelInput" class="form-control form-control-sm" placeholder="model:provider/name:free">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
          <button type="button" class="btn btn-primary" onclick="applyCustomModel()">Применить</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Модальное окно: история сообщений -->
  <div class="modal fade" id="historyModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">История диалога (ID: <span id="modalHistoryUserId"></span>)</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="historyMessages" style="max-height: 50vh; overflow-y: auto;">
          <!-- Сообщения появятся здесь -->
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    let currentUserId = null;

    function openModelSelector(userId) {
      currentUserId = userId;
      document.getElementById('modalUserId').textContent = userId;
      const modal = new bootstrap.Modal(document.getElementById('modelModal'));
      modal.show();
    }

    function changeModelTo(model) {
      if (!currentUserId) return;
      // В реальности: fetch(`/api/users/${currentUserId}/model`, { method: 'POST', body: JSON.stringify({ model }) })
      alert(`✅ Модель для пользователя ${currentUserId} изменена на:\n\n${model}`);
      bootstrap.Modal.getInstance(document.getElementById('modelModal')).hide();
    }

    function applyCustomModel() {
      const customModel = document.getElementById('customModelInput').value.trim();
      if (customModel && currentUserId) {
        changeModelTo(customModel);
      }
    }

    function loadHistory(userId) {
      document.getElementById('modalHistoryUserId').textContent = userId;
      // Здесь можно загрузить историю через AJAX
      const mockMessages = [
        { role: 'user', content: 'Привет!' },
        { role: 'ai', content: 'Здравствуйте! Чем могу помочь?' },
        { role: 'user', content: 'Какая у меня модель?' },
        { role: 'ai', content: 'У вас выбрана модель `z-ai/glm-4.5-air:free`. Отличный выбор!' }
      ];
      const html = mockMessages.map(m =>
        `<div class="message ${m.role === 'user' ? 'user-msg' : 'bot-msg'}">
          <strong>${m.role === 'user' ? '👤 Пользователь' : '🤖 Бот'}:</strong><br>
          ${m.content}
        </div>`
      ).join('');
      document.getElementById('historyMessages').innerHTML = html;
      const modal = new bootstrap.Modal(document.getElementById('historyModal'));
      modal.show();
    }
  </script>
</body>
</html>
