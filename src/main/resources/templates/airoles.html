<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Управление ролями ИИ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      padding-top: 60px;
    }
    .sidebar {
      position: fixed;
      top: 0;
      bottom: 0;
      left: 0;
      z-index: 100;
      padding: 1rem 1rem;
      width: 250px;
      background-color: #f8f9fa;
      border-right: 1px solid #e9ecef;
    }
    .main-content {
      margin-left: 260px;
      padding: 0 1rem;
    }
    .role-card { margin-bottom: 1rem; }
    .prompt-preview { 
      font-family: Consolas, monospace; 
      font-size: 0.85em; 
      color: #495057; 
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .status-badge {
      width: 80px;
    }
  </style>
</head>
<body>

  <div th:replace="fragments/sidebar :: sidebar"></div>

  <main class="main-content">
    <div class="container-fluid mt-4">
      <h1 class="mb-4">🎭 Роли ИИ</h1>

      <!-- Форма добавления -->
      <div class="card mb-4">
        <div class="card-header bg-success text-white">
          <h5 class="mb-0">Добавить новую роль</h5>
        </div>
        <div class="card-body">
          <form th:action="@{/admin/roles}" method="post">
            <div class="row g-2">
              <div class="col-md-4">
                <input type="text" name="title" class="form-control" placeholder="Название роли" required>
              </div>
              <div class="col-md-7">
                <input type="text" name="prompt" class="form-control" placeholder="Системный промт (опционально)">
              </div>
              <div class="col-md-1 d-flex align-items-end">
                <button type="submit" class="btn btn-success">Добавить</button>
              </div>
            </div>
          </form>
        </div>
      </div>

      <!-- Список ролей -->
      <div class="row" id="rolesList">
        <div class="col-12">
          <h5>Существующие роли (<span th:text="${roles.size()}"></span>)</h5>
        </div>

        <div class="col-md-6 col-lg-4" th:each="role : ${roles}">
          <div class="card role-card shadow-sm">
            <div class="card-body">
              <h6 class="card-title mb-2" th:text="${role.title}">Программирование</h6>
              <p class="prompt-preview mb-2" th:title="${role.prompt}" th:text="${role.prompt}">...</p>

              <!-- Статус -->
              <div class="mb-2">
                <span class="badge status-badge"
                      th:classappend="${role.active} ? 'bg-success' : 'bg-secondary'"
                      th:text="${role.active} ? 'Активна' : 'Отключена'">
                </span>
              </div>

              <!-- Кнопки управления -->
              <div class="d-flex gap-1">
                <!-- Переключение активности -->
                <form th:action="@{/admin/roles/{id}/toggle(id=${role.id})}" method="post" style="display:inline;">
                  <button type="submit" class="btn btn-sm"
                          th:classappend="${role.active} ? 'btn-outline-secondary' : 'btn-outline-success'"
                          th:text="${role.active} ? 'Отключить' : 'Включить'">
                  </button>
                </form>

                <!-- Удаление -->
                <form th:action="@{/admin/roles/{id}/delete(id=${role.id})}" method="post" style="display:inline;"
                      onsubmit="return confirm('Удалить роль? Это повлияет на всех пользователей.')">
                  <button type="submit" class="btn btn-sm btn-outline-danger">Удалить</button>
                </form>
              </div>
            </div>
          </div>
        </div>

        <div class "col-12 mt-3" th:if="${roles.isEmpty()}">
          <div class="alert alert-info">Нет ролей. Добавьте первую!</div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
