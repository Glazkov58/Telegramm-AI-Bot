<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Выбор тарифа — Платные подписки</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      padding-top: 60px;
    }
    .sidebar {
      position: fixed;
      top: 0;
      bottom: 0;
      left: 0;
      z-index: 100;
      padding: 1rem 1rem;
      width: 250px;
      background-color: #f8f9fa;
      border-right: 1px solid #e9ecef;
    }
    .main-content {
      margin-left: 260px;
      padding: 0 1rem;
    }
    .tariff-card {
      transition: transform 0.2s;
    }
    .tariff-card:hover {
      transform: translateY(-5px);
    }
    .tariff-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 0.75em;
    }
  </style>
</head>
<body>

  <div th:replace="fragments/sidebar :: sidebar"></div>

  <div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1>💳 Выбор тарифа для пользователя</h1>
      <a href="/admin/users" class="btn btn-outline-secondary">← Назад к списку</a>
    </div>

    <div class="alert alert-info">
      <strong>Пользователь:</strong> 
      <span th:text="${user.firstName} ?: '—'"></span>
      <span th:if="${user.username}" th:text="' (@' + ${user.username} + ')'"></span>
    </div>

    <!-- Форма для выбора тарифа -->
    <form th:action="@{/admin/users/{id}/tariff(id=${user.id})}" method="post">
      <input type="hidden" name="userId" th:value="${user.id}" />

      <div class="row g-4">
        <!-- Тариф Lite -->
        <div class="col-md-4">
          <div class="card tariff-card border-primary position-relative">
            <div class="card-header bg-primary text-white text-center">
              <h5 class="mb-0">Lite</h5>
            </div>
            <div class="card-body text-center">
              <div class="display-6 text-success mb-2">50 ₽</div>
              <p class="text-muted">на 1 месяц</p>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="tariff" id="lite" value="lite" required>
                <label class="form-check-label" for="lite">Выбрать тариф</label>
              </div>
            </div>
          </div>
        </div>

        <!-- Тариф Pro -->
        <div class="col-md-4">
          <div class="card tariff-card border-success position-relative">
            <div class="card-header bg-success text-white text-center">
              <h5 class="mb-0">Pro</h5>
              <span class="badge bg-light text-dark tariff-badge">Экономия 17%</span>
            </div>
            <div class="card-body text-center">
              <div class="display-6 text-success mb-2">250 ₽</div>
              <p class="text-muted">на 6 месяцев</p>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="tariff" id="pro" value="pro" required>
                <label class="form-check-label" for="pro">Выбрать тариф</label>
              </div>
            </div>
          </div>
        </div>

        <!-- Тариф Profi -->
        <div class="col-md-4">
          <div class="card tariff-card border-info position-relative">
            <div class="card-header bg-info text-white text-center">
              <h5 class="mb-0">Profi</h5>
              <span class="badge bg-light text-dark tariff-badge">Экономия 33%</span>
            </div>
            <div class="card-body text-center">
              <div class="display-6 text-success mb-2">500 ₽</div>
              <p class="text-muted">на 12 месяцев</p>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="tariff" id="profi" value="profi" required>
                <label class="form-check-label" for="profi">Выбрать тариф</label>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="mt-4 text-center">
        <button type="submit" class="btn btn-success btn-lg">✅ Активировать подписку</button>
      </div>
    </form>

    <!-- Текущий тариф (если есть) -->
    <div class="mt-5" th:if="${user.premiumActive}">
      <div class="alert alert-warning">
        <strong>⚠️ Внимание:</strong> У пользователя уже активен платный тариф 
        <strong th:text="${#temporals.format(user.premiumUntil, 'до dd.MM.yyyy')}"></strong>.
        Новый тариф заменит текущий.
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
