<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>История пользователя</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .message {
      padding: 0.75rem;
      margin-bottom: 0.75rem;
      border-radius: 8px;
      font-size: 0.95rem;
    }
    .user-msg { background-color: #e9ecef; border-left: 4px solid #6c757d; }
    .bot-msg { background-color: #d1ecf1; border-left: 4px solid #17a2b8; }
    .model-badge {
      font-family: Consolas, monospace;
      font-size: 0.8em;
    }
  </style>
</head>
<body>

  <div th:replace="fragments/sidebar :: sidebar"></div>
  
  <div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1>История диалога</h1>
      <a href="/admin/users" class="btn btn-secondary">← Назад к списку</a>
    </div>

    <div class="alert alert-info">
      <strong>Пользователь:</strong> 
      <span th:text="${user.firstName} ?: '—'"></span>
      <span th:if="${user.username}" th:text="' (@' + ${user.username} + ')'"></span>
      <br>
      <strong>Текущая модель ИИ:</strong> 
      <span class="badge bg-success model-badge" th:text="${currentModel}">gpt-4</span>
    </div>

    <div th:if="${historyItems.isEmpty()}" class="alert alert-warning">Нет сообщений</div>

    <div th:unless="${historyItems.isEmpty()}">
      <h4>Сообщения (<span th:text="${historyItems.size()}"></span>)</h4>
      <div class="mt-3">
        <div th:each="item : ${historyItems}" class="message" th:classappend="${item.sender == 'Пользователь'} ? 'user-msg' : 'bot-msg'">
          <div class="d-flex justify-content-between small text-muted mb-1">
            <strong th:text="${item.sender}">Пользователь</strong>
            <span th:text="${#temporals.format(item.timestamp, 'HH:mm dd.MM.yyyy')}">10:30 18.11.2025</span>
          </div>
          <div th:text="${item.content}">Текст сообщения...</div>
          <div class="mt-1 small">
            <span class="badge bg-light text-dark model-badge" th:text="${item.model}">gpt-4</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
