<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Управление моделями ИИ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      padding-top: 60px;
    }
    .sidebar {
      position: fixed;
      top: 0;
      bottom: 0;
      left: 0;
      z-index: 100;
      padding: 1rem 1rem;
      width: 250px;
      background-color: #f8f9fa;
      border-right: 1px solid #e9ecef;
    }
    .main-content {
      margin-left: 260px;
      padding: 0 1rem;
    }
    .model-key {
      font-family: Consolas, monospace;
      font-size: 0.85em;
      color: #495057;
    }
    .status-badge {
      width: 100px;
    }
  </style>
</head>
<body>

  <div th:replace="fragments/sidebar :: sidebar"></div>

  <div class="container mt-4">
    <h1 class="mb-4">🧠 Управление моделями ИИ</h1>

    <!-- Форма добавления -->
    <div class="card mb-4">
      <div class="card-header bg-success text-white">
        <h5 class="mb-0">Добавить новую модель</h5>
      </div>
      <div class="card-body">
        <form th:action="@{/admin/models}" th:object="${newModel}" method="post">
          <div class="row g-3">
            <div class="col-md-4">
              <input type="text" class="form-control" th:field="*{title}" placeholder="Название (DeepSeek, Grok4...)" required>
            </div>
            <div class="col-md-5">
              <input type="text" class="form-control" th:field="*{key}" placeholder="Ключ модели (x-ai/grok-4.1-fast:free)" required>
            </div>
            <div class="col-md-2">
              <input type="text" class="form-control" th:field="*{provider}" placeholder="Провайдер">
            </div>
            <div class="col-md-1 d-flex align-items-end">
              <button type="submit" class="btn btn-success">Добавить</button>
            </div>
          </div>
        </form>
      </div>
    </div>

    <!-- Список моделей -->
    <div class="card">
      <div class="card-header bg-primary text-white">
        <h5 class="mb-0">Список моделей</h5>
      </div>
      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-hover align-middle">
            <thead>
              <tr>
                <th>Название</th>
                <th>Ключ модели</th>
                <th>Провайдер</th>
                <th>Статус</th>
                <th>Действия</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="model : ${models}">
                <td th:text="${model.title}">DeepSeek</td>
                <td>
                  <code class="model-key" th:text="${model.key}">tngtech/...</code>
                </td>
                <td th:text="${model.provider} ?: '—'">DeepSeek</td>
                <td>
                  <span class="badge status-badge"
                        th:classappend="${model.active} ? 'bg-success' : 'bg-secondary'"
                        th:text="${model.active} ? 'Активна' : 'Отключена'">
                  </span>
                </td>
                <td>
                  <form th:action="@{/admin/models/{id}/toggle(id=${model.id})}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-sm"
                            th:classappend="${model.active} ? 'btn-outline-secondary' : 'btn-outline-success'"
                            th:text="${model.active} ? 'Отключить' : 'Включить'">
                    </button>
                  </form>
                  <form th:action="@{/admin/models/{id}/delete(id=${model.id})}" method="post" style="display:inline;"
                        onsubmit="return confirm('Удалить модель?')">
                    <button type="submit" class="btn btn-sm btn-outline-danger">Удалить</button>
                  </form>
                </td>
              </tr>
              <tr th:if="${#lists.isEmpty(models)}">
                <td colspan="5" class="text-center text-muted">Нет моделей</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
